<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>签字报表确认系统 - 报告中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .container { max-width: 800px; width: 100%; }
        h1 { font-size: 28px; margin-bottom: 8px; color: #1a1a2e; }
        .subtitle { color: #666; margin-bottom: 32px; font-size: 14px; }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .card a {
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .card-icon {
            width: 48px; height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        .card-content h3 { font-size: 16px; margin-bottom: 4px; }
        .card-content p { font-size: 13px; color: #888; }
        .icon-green { background: #e8f5e9; }
        .icon-blue { background: #e3f2fd; }
        .icon-purple { background: #f3e5f5; }
        .footer { margin-top: 40px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>签字报表确认系统</h1>
        <p class="subtitle">自动考勤确认 · 进度跟踪 · 多维看板</p>

        <div class="card">
            <a href="考勤确认统计.html" target="_blank">
                <div class="card-icon icon-green">&#9745;</div>
                <div class="card-content">
                    <h3>考勤确认统计</h3>
                    <p>员工考勤确认状态汇总统计</p>
                </div>
            </a>
        </div>

        <div class="card">
            <a href="进度报告.html" target="_blank">
                <div class="card-icon icon-blue">&#128200;</div>
                <div class="card-content">
                    <h3>进度报告</h3>
                    <p>考勤确认流程整体进度追踪</p>
                </div>
            </a>
        </div>

        <div class="card">
            <a href="多维表格看板.html" target="_blank">
                <div class="card-icon icon-purple">&#128202;</div>
                <div class="card-content">
                    <h3>多维表格看板</h3>
                    <p>飞书多维表格数据看板</p>
                </div>
            </a>
        </div>

        <div class="footer">
            kimliang63/signing-report &middot; GitHub Pages
        </div>
    </div>
</body>
</html>
