<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>签字报表确认系统 - 综合看板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" onerror="document.write('\u003Cscript src=\x22https://unpkg.com/papaparse@5.4.1/papaparse.min.js\x22\u003E\u003C/script\u003E')"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" onerror="document.write('\u003Cscript src=\x22https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js\x22\u003E\u003C/script\u003E')"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333;min-height:100vh;padding:20px}
.container{max-width:1400px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.header h1{font-size:22px;color:#1a1a2e}
.header .sub{color:#888;font-size:13px}
.tabs{display:flex;gap:4px;margin-bottom:16px;background:#e8eaf0;border-radius:10px;padding:4px;width:fit-content}
.tab{padding:8px 20px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:#555;border:none;background:transparent;transition:.15s}
.tab.active{background:#fff;color:#1a1a2e;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.tab:hover:not(.active){color:#333}
.upload-zone{border:2px dashed #ccc;border-radius:10px;padding:24px;text-align:center;background:#fff;margin-bottom:16px;transition:.2s;cursor:pointer}
.upload-zone:hover{border-color:#0E66FB;background:#f5f8ff}
.upload-zone.dragover{border-color:#0E66FB;background:#f0f6ff}
.upload-zone.has-data{border-color:#12CC7E;background:#f6fff9}
.upload-zone .hint{color:#999;font-size:13px;margin-top:4px}
.file-status{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.file-item{background:#fff;border-radius:6px;padding:6px 12px;font-size:12px;border:1px solid #e5e5e5;display:flex;align-items:center;gap:6px}
.file-item.loaded{border-color:#12CC7E;background:#f6fff9}
.file-item .dot{width:8px;height:8px;border-radius:50%;background:#ddd}
.file-item.loaded .dot{background:#12CC7E}
/* action bar */
.action-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.action-bar .file-badge{font-size:12px;color:#888;background:#fff;padding:4px 10px;border-radius:12px;border:1px solid #e5e5e5}
.btn{padding:8px 18px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:#f0f0f0}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#0E66FB;color:#fff;border-color:#0E66FB}
.btn-primary:hover{background:#0a52d4}
.btn-success{background:#12CC7E;color:#fff;border-color:#12CC7E}
.btn-success:hover{background:#0fb56e}
.btn-danger{background:#D9001B;color:#fff;border-color:#D9001B}
.btn-danger:hover{background:#b80016}
/* progress bar */
.progress-wrap{background:#fff;border-radius:8px;padding:16px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.progress-bar-bg{height:6px;border-radius:3px;background:#e5e5e5;overflow:hidden;margin-bottom:8px;position:relative}
.progress-bar-fill{height:100%;border-radius:3px;background:#0E66FB;width:0%;transition:width .3s ease}
.progress-text{font-size:12px;color:#888;text-align:center}
/* collapsible panel */
.collapsible{margin-bottom:10px;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.collapsible-header{background:#fff;padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;color:#333;user-select:none;transition:.15s}
.collapsible-header:hover{background:#f8f9fb}
.collapsible-header .arrow{transition:transform .2s;font-size:12px;color:#999}
.collapsible.open .collapsible-header .arrow{transform:rotate(90deg)}
.collapsible-body{background:#fff;padding:0 16px 16px;display:none}
.collapsible.open .collapsible-body{display:block}
/* stat cards */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:#f8f9fb;border-radius:6px;padding:14px;text-align:center}
.stat-card .num{font-size:28px;font-weight:700;line-height:1.2}
.stat-card .label{font-size:12px;color:#888;margin-top:2px}
.stat-card.blue .num{color:#0E66FB}
.stat-card.green .num{color:#12CC7E}
.stat-card.orange .num{color:#FFAA0E}
.stat-card.red .num{color:#D9001B}
/* filter bar */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.filter-bar select,.filter-bar input{padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff}
.filter-bar input{flex:1;min-width:160px}
.filter-bar .info{font-size:12px;color:#888;margin-left:auto}
/* table */
.table-wrap{overflow-x:auto;border-radius:6px;border:1px solid #eee}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f4f7fe;padding:9px 12px;text-align:left;font-weight:600;color:#555;border-bottom:1px solid #e5e5e5;white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid #f0f0f0;color:#444}
tr:hover td{background:#fafbfc}
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;font-size:13px}
.pagination button{padding:3px 10px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;font-size:12px}
.pagination button:hover{background:#f0f0f0}
.pagination button:disabled{opacity:.4;cursor:default}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.badge-warning{background:#fff3e0;color:#e65100}
.badge-error{background:#fce4ec;color:#c62828}
.badge-success{background:#e8f5e9;color:#2e7d32}
.badge-info{background:#e3f2fd;color:#1565c0}
.badge-pending{background:#fff8e1;color:#f57f17}
.bar-row{display:flex;align-items:center;gap:6px;margin:2px 0;font-size:12px}
.bar-row .bar-label{width:100px;text-align:right;color:#666;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-row .bar-fill{height:14px;border-radius:3px;min-width:4px;transition:.3s}
.bar-row .bar-num{font-size:11px;color:#888;white-space:nowrap}
/* confirmation */
.dept-tree{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:12px}
.dept-card{background:#fff;border-radius:8px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.dept-card .dept-name{font-size:13px;font-weight:600;margin-bottom:4px;color:#333}
.dept-card .dept-stat{display:flex;gap:10px;font-size:12px;color:#666}
.obj-list{display:grid;gap:6px}
.obj-item{background:#fff;border-radius:6px;padding:8px 12px;border-left:3px solid #FFAA0E;font-size:13px}
.obj-item .obj-emp{font-weight:600;color:#333}
.obj-item .obj-reason{color:#888;font-size:12px;margin-top:2px}
.progress-bar{height:8px;border-radius:4px;background:#e5e5e5;overflow:hidden;display:flex;margin-bottom:4px}
.progress-bar .seg{height:100%;transition:.3s}
.progress-bar .seg.success{background:#12CC7E}
.progress-bar .seg.warning{background:#FFAA0E}
.progress-bar .seg.danger{background:#D9001B}
.progress-bar .seg.clean{background:#27AE60}
.progress-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-top:2px}
/* checkbox in confirmation list */
.confirm-chk{width:16px;height:16px;cursor:pointer;accent-color:#0E66FB;margin:0;vertical-align:middle}
.chk-col{width:30px;text-align:center}
.chk-all{width:16px;height:16px;cursor:pointer;accent-color:#0E66FB;margin:0;vertical-align:middle}
/* send status badges */
.test-mode-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:#555;margin-left:12px;flex-shrink:0}
.test-mode-bar input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:#0E66FB;margin:0}
.test-mode-bar .test-emp-input{padding:3px 8px;border:1px solid #ccc;border-radius:4px;font-size:12px;width:120px;display:none}
.test-mode-bar .test-emp-input:focus{border-color:#0E66FB;outline:none}
.send-count{font-size:12px;color:#888;margin-left:auto}
.status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.status-badge-pending{background:#F0F0F0;color:#999}
.status-badge-ok{background:#E8F5E9;color:#2E7D32}
.status-badge-fail{background:#FFEBEE;color:#C62828}
.status-badge-sending{background:#FFF3E0;color:#E65100}
.empty{text-align:center;padding:30px;color:#999;font-size:13px}
.panel{display:none}
.panel.active{display:block}
.v-divider{width:1px;height:20px;background:#ddd;margin:0 4px}
.btn-sm{padding:5px 12px;font-size:12px}
.row-clean{background:#f9fff9}
.btn-warning{background:#E67E22;color:#fff;border-color:#E67E22}
.btn-warning:hover{background:#D35400}
/* modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.35);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:12px;padding:24px;max-width:560px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal-box h2{font-size:16px;margin-bottom:12px;color:#1a1a2e}
.modal-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:#999;line-height:1}
.modal-close:hover{color:#333}
.modal-table{width:100%;border-collapse:collapse;font-size:13px}
.modal-table th{background:#f4f7fe;padding:8px 10px;text-align:left;font-weight:600;color:#555;border-bottom:1px solid #e5e5e5}
.modal-table td{padding:7px 10px;border-bottom:1px solid #f0f0f0}
.modal-table tr:last-child td{border-bottom:none}
.modal-table .num-col{text-align:center;font-weight:600}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>签字报表确认系统</h1>
      <div class="sub">综合看板 &middot; 手动校验模式</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="dataStatus" class="badge badge-pending">未上传文件</span>
    </div>
  </div>

  <div class="tabs" id="mainTabs">
    <button class="tab active" data-panel="validation">数据校验</button>
    <button class="tab" data-panel="confirmation">员工确认</button>
  </div>

  <input type="file" id="fileInput" accept=".csv,.xls,.xlsx" multiple style="display:none">

  <!-- =================== PANEL: 数据校验 =================== -->
  <div id="panel-validation" class="panel active">
    <!-- Upload zone -->
    <div class="upload-zone" id="dropZoneV">
      <div style="font-size:28px;margin-bottom:4px">&#128451;</div>
      <div><strong>上传数据文件</strong></div>
      <div class="hint">支持 .csv / .xls / .xlsx，可多选 &middot; 也可拖放文件到此处</div>
      <div id="uploadLoadingV" style="display:none;color:#0E66FB;margin-top:6px;font-size:13px">&#8987; 处理中...</div>
    </div>
    <div class="file-status" id="fileStatusV"></div>

    <!-- Action bar: 开始校验 + 导出 -->
    <div class="action-bar" id="actionBarV" style="display:none">
      <span class="file-badge" id="fileCountBadge">0 个文件</span>
      <button class="btn btn-primary" id="btnStartValidation" onclick="startValidation()">&#9654; 开始校验</button>
      <span class="v-divider"></span>
      <button class="btn" id="btnExportCSV" onclick="exportCSV()" disabled>&#11015; 导出 CSV</button>
      <button class="btn" onclick="clearAllData()">&#128465; 清空重选</button>
    </div>

    <!-- Progress indicator (hidden until validation starts) -->
    <div class="progress-wrap" id="progressWrap" style="display:none">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">准备中...</div>
    </div>

    <!-- Collapsible: 总览统计 -->
    <div class="collapsible" id="overviewPanel">
      <div class="collapsible-header" onclick="toggleCollapse('overviewPanel')">
        <span>&#128202; 校验总览</span>
        <span class="arrow">&#9654;</span>
      </div>
      <div class="collapsible-body">
        <div class="stats" id="statsV"></div>
        <div id="ruleBarsV"></div>
        <div id="ruleDetailV" style="margin-top:12px"></div>
      </div>
    </div>

    <!-- Collapsible: 明细数据 -->
    <div class="collapsible" id="detailPanel">
      <div class="collapsible-header" onclick="toggleCollapse('detailPanel')">
        <span>&#128203; 明细数据</span>
        <span class="arrow">&#9654;</span>
      </div>
      <div class="collapsible-body">
        <div class="filter-bar" id="filterBarV">
          <input type="text" id="searchInput" placeholder="搜索工号或姓名...">
          <select id="ruleFilter"><option value="">所有错误类型</option><option value="warning">Warning</option><option value="error">Error</option></select>
          <span class="info" id="tableInfo">共 0 条</span>
        </div>
        <div class="table-wrap" id="tableWrapV">
          <table><thead><tr><th>工号</th><th>员工</th><th>部门</th><th>考勤日期</th><th>错误类型</th><th>错误详情</th></tr></thead><tbody id="tbodyV"></tbody></table>
          <div class="pagination" id="paginationV">
            <button onclick="prevPage()" id="prevBtn">上一页</button>
            <span class="page-info" id="pageInfo">1/1</span>
            <button onclick="nextPage()" id="nextBtn">下一页</button>
            <select id="pageSize" onchange="renderTable()" style="margin-left:6px;padding:3px 6px;border:1px solid #ddd;border-radius:4px;font-size:12px">
              <option value="20">20条/页</option><option value="50">50条/页</option><option value="100">100条/页</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- =================== PANEL: 员工确认 =================== -->
  <div id="panel-confirmation" class="panel">
    <div class="action-bar" id="actionBarC">
      <span class="file-badge" id="confirmBadge">0 个待确认员工</span>
      <button class="btn btn-primary" onclick="buildConfirmationList()">🔄 从校验结果生成确认名单</button>
      <button class="btn btn-success" onclick="sendAllFeishuCards()" id="sendAllBtn" disabled>📨 发送飞书卡片</button>
      <div class="test-mode-bar">
        <input type="checkbox" id="testModeSwitch" onchange="toggleTestMode()">
        <label for="testModeSwitch" style="cursor:pointer;user-select:none">🧪 测试</label>
        <input type="text" class="test-emp-input" id="testEmpIdInline" placeholder="输入工号">
      </div>
      <span class="send-count" id="sendCountBadge"></span>
    </div>

    <div class="stats" id="statsC" style="display:none">
      <div class="stat-card blue"><div class="num" id="totalEmp">0</div><div class="label">异常员工</div></div>
      <div class="stat-card green"><div class="num" id="confirmedCount">0</div><div class="label">已确认</div></div>
      <div class="stat-card orange"><div class="num" id="pendingCount">0</div><div class="label">待确认</div></div>
      <div class="stat-card red"><div class="num" id="objectionCount">0</div><div class="label">有异议</div></div>
      <div class="stat-card" style="background:#eafaf1;border-color:#27AE60"><div class="num" id="cleanCount" style="color:#27AE60">0</div><div class="label">无异常</div></div>
    </div>

    <div id="progressSection" style="display:none;margin-bottom:12px">
      <h3 style="font-size:14px;margin-bottom:6px;color:#333">整体确认进度</h3>
      <div class="progress-bar" id="progressBar"></div>
      <div class="progress-labels" id="progressLabels"></div>
    </div>

    <h3 style="font-size:14px;margin-bottom:6px;color:#333">员工确认名单</h3>
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead><tr style="background:#f4f7fe">
        <th class="chk-col" style="padding:8px 4px;text-align:center;border-bottom:1px solid #e5e5e5"><input type="checkbox" class="chk-all" id="chkAll" onchange="toggleSelectAll(this.checked)"></th>
        <th style="padding:8px 10px;text-align:left;border-bottom:1px solid #e5e5e5;font-weight:600;color:#555">工号</th>
        <th style="padding:8px 10px;text-align:left;border-bottom:1px solid #e5e5e5;font-weight:600;color:#555">员工</th>
        <th style="padding:8px 10px;text-align:left;border-bottom:1px solid #e5e5e5;font-weight:600;color:#555">部门</th>
        <th style="padding:8px 10px;text-align:center;border-bottom:1px solid #e5e5e5;font-weight:600;color:#555">异常条数</th>
        <th style="padding:8px 10px;text-align:center;border-bottom:1px solid #e5e5e5;font-weight:600;color:#555">状态</th>
        <th style="padding:8px 10px;text-align:center;border-bottom:1px solid #e5e5e5;font-weight:600;color:#555">发送状态</th>
        <th style="padding:8px 10px;text-align:center;border-bottom:1px solid #e5e5e5;font-weight:600;color:#555">操作</th>
      </tr></thead>
      <tbody id="confirmTbody"></tbody>
    </table>
  </div>
</div>
<script>
// ========== STATE ==========
const state = {
  validation: { data: [], filtered: [], page: 1, pageSize: 20, validated: false },
  confirmation: { rows: [], loaded: false },
  files: {},
  serverUrl: 'http://localhost:8899'
};
const COLORS = {'R1.1':'#0E66FB','R1.2':'#0E66FB','R3':'#FFAA0E','R4':'#9C27B0','R5':'#D9001B','R6':'#E67E22','R7':'#2ECC71'};

// ========== PERSISTENCE (localStorage) ==========
function saveState(){
  try{
    const cpy = {
      validation: { data: state.validation.data, filtered: [], page: 1, pageSize: state.validation.pageSize, validated: state.validation.validated },
      confirmation: { rows: state.confirmation.rows, loaded: state.confirmation.loaded },
      files: state.files,
      serverUrl: state.serverUrl
    };
    const json = JSON.stringify(cpy);
    // localStorage max ~5MB; if too large, skip files data
    if(json.length > 4_000_000){
      cpy.files = {};
      const json2 = JSON.stringify(cpy);
      localStorage.setItem('signing_report_state', json2);
      localStorage.setItem('signing_report_files_keys', JSON.stringify(Object.keys(state.files)));
      console.warn('Files data too large for localStorage, saved keys only');
    } else {
      localStorage.setItem('signing_report_state', json);
      const fkeys = Object.keys(state.files);
      localStorage.setItem('signing_report_files_keys', JSON.stringify(fkeys));
    }
  } catch(e){ console.warn('saveState error:', e); }
}
function loadState(){
  try {
    const raw = localStorage.getItem('signing_report_state');
    if(!raw) return false;
    const saved = JSON.parse(raw);
    state.validation = saved.validation || state.validation;
    state.confirmation = saved.confirmation || state.confirmation;
    state.serverUrl = saved.serverUrl || state.serverUrl;
    // Files are too large for localStorage — just restore keys
    state.files = {};
    const fkeys = JSON.parse(localStorage.getItem('signing_report_files_keys') || '[]');
    fkeys.forEach(k => { state.files[k] = []; }); // empty placeholders
    console.log('State restored from localStorage (files omitted)');
    return true;
  } catch(e){ console.warn('loadState error:', e); return false; }
}
function getServerUrl(){ return state.serverUrl || 'http://localhost:8899'; }

// ========== TAB SWITCH ==========
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    const panel = document.getElementById('panel-'+t.dataset.panel);
    if(panel) panel.classList.add('active');
  });
});

// ========== FILE INPUT ==========
const fileInput = document.getElementById('fileInput');
fileInput.addEventListener('change', function(e){
  if(this.files.length) loadFiles(this.files);
  this.value = '';
});

function openFilePicker(){
  fileInput.click();
}
document.getElementById('dropZoneV').addEventListener('click', openFilePicker);

['dropZoneV'].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('dragover')});
  el.addEventListener('dragleave',()=>el.classList.remove('dragover'));
  el.addEventListener('drop',e=>{
    e.preventDefault();el.classList.remove('dragover');
    if(e.dataTransfer.files.length) loadFiles(e.dataTransfer.files);
  });
});

// ========== FILE LOADING ==========
function loadFiles(files){
  document.getElementById('dataStatus').textContent='加载中...';
  document.getElementById('dataStatus').className='badge badge-info';
  document.getElementById('uploadLoadingV').style.display='block';

  let pending = files.length;

  function done(){
    pending--;
    if(pending === 0){
      document.getElementById('uploadLoadingV').style.display='none';
      document.getElementById('dataStatus').textContent='已上传';
      document.getElementById('dataStatus').className='badge badge-success';
      updateFileUI();
      saveState();
    }
  }

  Array.from(files).forEach(f => {
    const name = f.name.toLowerCase();
    if(name.endsWith('.csv')){
      const reader = new FileReader();
      reader.onload = e => {
        Papa.parse(e.target.result, {header:true, complete: r => {
          state.files[f.name] = r.data.filter(d => Object.values(d).some(v=>v && v.trim()));
          done();
        }});
      };
      reader.readAsText(f);
    } else if(name.endsWith('.xls') || name.endsWith('.xlsx')){
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const wb = XLSX.read(e.target.result, {type:'array'});
          let best = [], bestLen = 0;
          wb.SheetNames.forEach(sn => {
            const data = XLSX.utils.sheet_to_json(wb.Sheets[sn], {header:1, defval:''});
            if(data.length > bestLen){ best = data; bestLen = data.length; }
          });
          if(best.length > 1){
            const headers = best[0].map(h => String(h).trim());
            const rows = [];
            for(let i=1; i<best.length; i++){
              const row = {};
              headers.forEach((h, idx) => { row[h] = best[i][idx] !== undefined ? String(best[i][idx]).trim() : ''; });
              if(Object.values(row).some(v=>v)) rows.push(row);
            }
            state.files[f.name] = rows;
          } else {
            state.files[f.name] = [];
          }
        } catch(err) {
          console.error('XLSX parse error:', err);
          state.files[f.name] = [];
        }
        done();
      };
      reader.readAsArrayBuffer(f);
    } else {
      state.files[f.name] = [];
      done();
    }
  });
}

// ========== START VALIDATION (built-in rule engine) ==========
const WEEKEND_DATES = {};
(function(){const d=new Date(2026,4,1);const e=new Date(2026,4,31);while(d<=e){if(d.getDay()===0||d.getDay()===6)WEEKEND_DATES[d.toISOString().slice(0,10)]=1;d.setDate(d.getDate()+1)}})();

function gn(v){const n=parseFloat(v);return isNaN(n)?0:n}

function findFile(patterns){
  // Find a file whose first row contains ALL specified column patterns
  const names=Object.keys(state.files);
  for(const pats of patterns){
    for(const name of names){
      const rows=state.files[name];
      if(!rows||!rows.length) continue;
      const sample=rows[0];
      let match=true;
      for(const p of pats){
        const found=Object.keys(sample).some(k=>k.includes(p));
        if(!found){match=false;break}
      }
      if(match) return {name,rows};
    }
  }
  // Fallback: try to match by filename keywords
  for(const pats of patterns){
    for(const name of names){
      for(const p of pats){
        if(name.toLowerCase().includes(p.toLowerCase())) return {name,rows:state.files[name]};
      }
    }
  }
  return null;
}

function startValidation(){
  // Reset
  state.validation.data = [];
  state.validation.filtered = [];
  state.validation.validated = false;

  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  progressWrap.style.display = 'block';

  const steps = [
    {label:'检测文件...', pct:5},
    {label:'识别数据类型...', pct:15},
    {label:'执行校验规则...', pct:40},
    {label:'R1.1 周末出勤...', pct:50},
    {label:'R1.2 打卡去重...', pct:60},
    {label:'R3 OT偏差...', pct:68},
    {label:'R4-R7 补签/REG/公出/居家...', pct:85},
    {label:'汇总统计...', pct:95},
    {label:'校验完成', pct:100}
  ];

  const btn = document.getElementById('btnStartValidation');
  btn.disabled = true;
  btn.innerHTML = '&#8987; 校验中...';

  function runStep(idx){
    if(idx >= steps.length){
      progressFill.style.width = '100%';
      const n = state.validation.data.length;
      const w = state.validation.data.filter(r=>r.level==='warning').length;
      const e = state.validation.data.filter(r=>r.level==='error').length;
      progressText.innerHTML = '&#10003; 校验完成！共 <strong>' + n + '</strong> 条异常 (Warning: ' + w + ' / Error: ' + e + ')' +
        '<br><span style="font-size:11px;color:#666">基于7条内置校验规则（R1.1~R7）自动分析</span>';
      btn.disabled = false;
      btn.innerHTML = '&#9654; 重新校验';
      state.validation.validated = true;
      document.getElementById('btnExportCSV').disabled = false;
      document.getElementById('overviewPanel').classList.add('open');
      document.getElementById('detailPanel').classList.add('open');
      applyFilters();
      saveState();
      return;
    }

    const step = steps[idx];
    setTimeout(() => {
      progressFill.style.width = step.pct + '%';
      progressText.textContent = step.label + ' (' + step.pct + '%)';

      if(idx === 1){
        // Identify files by their column structure
        const signFile = findFile([
          ['计薪出勤', 'REG', '工号'],
          ['签字', '考勤日期']
        ]);
        const punchFile = findFile([
          ['打卡时间', '工号', '考勤机'],
          ['打卡记录']
        ]);
        const suppFile = findFile([
          ['补签日期', '补签事由'],
          ['补签管理']
        ]);
        const leaveFile = findFile([
          ['休假类型', '销假'],
          ['休假流程']
        ]);
        const busFile = findFile([
          ['公出时长', '公出事由'],
          ['公出管理']
        ]);
        const tripFile = findFile([
          ['出差时长', '出差事由'],
          ['出差管理']
        ]);
        const homeFile = findFile([
          ['居家办公'],
          ['导出居家办公']
        ]);

        state._engineFiles = {
          signing: signFile, punch: punchFile, supp: suppFile,
          leave: leaveFile, bus: busFile, trip: tripFile, home: homeFile
        };

        // Show diagnostic of file matching
        const labels = { signing:'签字报表', punch:'打卡记录', supp:'补签管理', leave:'休假流程', bus:'公出管理', trip:'出差管理', home:'居家办公' };
        let diag = '📁 文件识别情况: ';
        for(const [key, label] of Object.entries(labels)){
          const f = state._engineFiles[key];
          diag += (f ? '✅' : '❌') + label + ' ';
        }
        progressText.innerHTML = step.label + ' (' + step.pct + '%)<br><span style="font-size:11px;color:#888">' + diag + '</span>';
      }

      if(idx === 2){
        // Run all rules
        const results = [];
        const ef = state._engineFiles;
        const s = ef.signing, p = ef.punch, sp = ef.supp, lv = ef.leave, b = ef.bus, t = ef.trip, h = ef.home;

        // Helper: get column value by alias
        function cv(row, aliases){
          for(const a of aliases){
            if(row[a]!==undefined) return row[a];
            for(const k of Object.keys(row)){
              if(k.includes(a)) return row[k];
            }
          }
          return '';
        }

        // Build employee map from signing report (attendance-date granularity)
        const signEmp = {};
        const signRows = {}; // {eid: [{dept3, dept4, dept5, date}, ...]}
        if(s){
          s.rows.forEach(r=>{
            const eid = cv(r,['工号','emp_id','员工编号']).trim();
            if(!eid || !eid.startsWith('GL')) return;
            const n = cv(r,['姓名','name']);
            const d3 = cv(r,['三级部门','dept3','department3']);
            const d4 = cv(r,['四级部门','dept4','department4']);
            const d5 = cv(r,['五级部门','dept5','department5']);
            if(!signEmp[eid]) signEmp[eid]={name:n, dept3:d3, dept4:d4, dept5:d5, reg:0, ot15:0, ot20:0, home_off:0, days:[]};
            const emp = signEmp[eid];
            if(!emp.dept3&&d3) emp.dept3=d3;
            if(!emp.dept4&&d4) emp.dept4=d4;
            if(!emp.dept5&&d5) emp.dept5=d5;
            if(!emp.name&&n) emp.name=n;
            emp.reg += gn(cv(r,['计薪出勤时长合计(REG)','REG','计薪出勤']));
            emp.ot15 += gn(cv(r,['OT1.5合计','OT1.5']));
            emp.ot20 += gn(cv(r,['OT2.0合计','OT2.0']));
            emp.home_off += gn(cv(r,['居家办公合计','居家']));
            const dt = cv(r,['考勤日期','date','日期']).slice(0,10);
            if(dt){
              emp.days.push(dt);
              if(!signRows[eid]) signRows[eid]=[];
              signRows[eid].push({dept3:d3||emp.dept3, dept4:d4||emp.dept4, dept5:d5||emp.dept5, date:dt, _rawRow:r});
            }
          });
        }

        // Build punch clock data
        const punchByEmp = {};
        if(p){
          p.rows.forEach(r=>{
            const eid = cv(r,['工号','emp_id','员工编号']).trim();
            const ct = cv(r,['打卡时间','punch_time','time']).trim();
            if(!eid||!ct) return;
            if(!punchByEmp[eid]) punchByEmp[eid]=[];
            punchByEmp[eid].push({datetime:ct, date:ct.slice(0,10)});
          });
        }

        // Build supplementary sign data
        const suppByEmp = {};
        if(sp){
          sp.rows.forEach(r=>{
            const eid = cv(r,['工号','emp_id']).trim();
            const ds = (cv(r,['补签日期','补签时间','date'])||'').slice(0,10);
            const st = cv(r,['审批状态','status']);
            const rs = cv(r,['补签事由','reason','备注']);
            if(eid&&ds){
              if(!suppByEmp[eid]) suppByEmp[eid]=[];
              suppByEmp[eid].push({date:ds, status:st, reason:rs});
            }
          });
        }

        // Build leave data
        const leaveByEmp = {};
        if(lv){
          lv.rows.forEach(r=>{
            const eid = cv(r,['工号','emp_id']).trim();
            if(!eid) return;
            leaveByEmp[eid]={
              type: cv(r,['休假类型','leave_type','type']),
              start: (cv(r,['开始时间','start_time','start'])+'').slice(0,10),
              end: (cv(r,['结束时间','end_time','end'])+'').slice(0,10)
            };
          });
        }

        // Build business trip
        const busByEmp = {};
        if(b){
          b.rows.forEach(r=>{
            const eid = cv(r,['工号','emp_id']).trim();
            if(!eid) return;
            if(!busByEmp[eid]) busByEmp[eid]=[];
            busByEmp[eid].push({start: cv(r,['开始时间','start']), status: cv(r,['审批状态','status'])});
          });
        }

        // Build trip
        const tripByEmp = {};
        if(t){
          t.rows.forEach(r=>{
            const eid = cv(r,['工号','emp_id']).trim();
            if(!eid) return;
            if(!tripByEmp[eid]) tripByEmp[eid]=[];
            tripByEmp[eid].push({start: cv(r,['开始时间','start']), status: cv(r,['审批状态','status'])});
          });
        }

        // Build home office
        const homeByEmp = {};
        if(h){
          h.rows.forEach(r=>{
            const eid = cv(r,['工号','emp_id']).trim();
            if(!eid) return;
            if(!homeByEmp[eid]) homeByEmp[eid]=[];
            homeByEmp[eid].push({start: cv(r,['开始时间','start']), status: cv(r,['审批状态','status'])});
          });
        }

        // ---- R1.1 周末打卡但休假未涵盖 ----
        Object.entries(signEmp).forEach(([eid, s])=>{
          const clocks = punchByEmp[eid]||[];
          const wkndClocks = clocks.filter(c=>WEEKEND_DATES[c.date]);
          if(!wkndClocks.length) return;
          const lvInfo = leaveByEmp[eid];
          const noLeave = wkndClocks.filter(c=>!(lvInfo&&c.date>=lvInfo.start&&c.date<=lvInfo.end));
          if(!noLeave.length) return;
          const dates = [...new Set(noLeave.map(c=>c.date))].sort();
          if(s.reg>0){
            results.push({rule:'R1.1', emp_id:eid, level:'warning',
              message:'周末考勤',
              detail:'考勤日期: '+dates.join(', ')+'（周末有打卡但休假/年假未涵盖，REG='+s.reg.toFixed(1)+'h）'});
          }
        });

        // ---- R1.2 打卡去重 ----
        Object.entries(punchByEmp).forEach(([eid, clocks])=>{
          const byDate={};
          clocks.forEach(c=>{if(!byDate[c.date]) byDate[c.date]=[]; byDate[c.date].push(c)});
          const dupDates=[];
          Object.entries(byDate).forEach(([ds,dcs])=>{
            if(dcs.length<2) return;
            const times=dcs.map(d=>new Date(d.datetime)).sort((a,b)=>a-b);
            for(let i=1;i<times.length;i++){
              if((times[i]-times[i-1])/60000<10){dupDates.push(ds);break}
            }
          });
          if(dupDates.length){
            const name=signEmp[eid]?signEmp[eid].name:'';
            results.push({rule:'R1.2', emp_id:eid, level:'warning',
              message:'打卡重卡',
              detail:'考勤日期: ['+[...new Set(dupDates)].sort().slice(0,8).join(', ')+']（同一日打卡间隔<10分钟，共'+dupDates.length+'天）'});
          }
        });

        // ---- R3 OT偏差>5% ----
        Object.entries(signEmp).forEach(([eid, s])=>{
          const clocks = punchByEmp[eid]||[];
          if(!clocks.length) return;
          const byDate={};
          clocks.forEach(c=>{if(!byDate[c.date]) byDate[c.date]=[]; byDate[c.date].push(c)});
          let eo15=0, eo20=0;
          Object.entries(byDate).forEach(([ds,dcs])=>{
            const times=dcs.map(d=>new Date(d.datetime)).sort((a,b)=>a-b);
            if(times.length<2) return;
            const th=(times[times.length-1]-times[0])/3600000;
            if(WEEKEND_DATES[ds]) eo20+=th;
            else if(th>8) eo15+=th-8;
          });
          [[s.ot15, eo15, 'OT1.5'],[s.ot20, eo20, 'OT2.0']].forEach(([sv,ev,label])=>{
            if(sv>0&&ev>0){
              const diff=Math.abs(sv-ev)/Math.max(sv,ev);
              if(diff>0.05){
                results.push({rule:'R3', emp_id:eid, level:'warning',
                  message:'加班偏差',
                  detail:'考勤日期: 当月 | '+label+' 签字报表='+sv.toFixed(1)+'h vs 系统估算='+ev.toFixed(1)+'h（偏差'+(diff*100).toFixed(0)+'%）'});
              }
            }
          });
        });

        // ---- R4 补签审批中 ----
        Object.entries(signEmp).forEach(([eid, s])=>{
          (suppByEmp[eid]||[]).forEach(p=>{
            if(p.status.includes('审批中')||p.status.includes('pending')||p.status.includes('approv')){
              results.push({rule:'R4', emp_id:eid, level:'warning',
                message:'补签审批',
                detail:'考勤日期: '+p.date+'（补签申请未完成审批，事由: '+(p.reason||'无').slice(0,30)+'，REG='+s.reg.toFixed(1)+'h）'});
            }
          });
        });

        // ---- R5 REG=0但有打卡 ----
        Object.entries(signEmp).forEach(([eid, s])=>{
          const clocks = punchByEmp[eid]||[];
          if(s.reg===0 && clocks.length>0){
            const dates=[...new Set(clocks.map(c=>c.date))].sort();
            results.push({rule:'R5', emp_id:eid, level:'error',
              message:'REG归零',
              detail:'考勤日期范围: '+dates[0]+' ~ '+dates[dates.length-1]+'（计薪出勤=0但存在'+clocks.length+'条打卡记录）'});
          }
        });

        // ---- R6 公出/出差审批中 ----
        Object.entries(signEmp).forEach(([eid, s])=>{
          (busByEmp[eid]||[]).forEach(b=>{
            const st=b.status.toLowerCase();
            if((st.includes('approv')||st.includes('审批')||st.includes('complete'))&&s.reg===0){
              results.push({rule:'R6', emp_id:eid, level:'warning',
                message:'公出/出差审批',
                detail:'考勤日期: '+b.start.slice(0,10)+'（公出审批中但REG=0，计薪出勤='+s.reg.toFixed(1)+'h）'});
            }
          });
          (tripByEmp[eid]||[]).forEach(tr=>{
            if(tr.status.includes('审批中')&&s.reg===0){
              results.push({rule:'R6', emp_id:eid, level:'warning',
                message:'公出/出差审批',
                detail:'考勤日期: '+tr.start.slice(0,10)+'（出差审批中但REG=0，计薪出勤='+s.reg.toFixed(1)+'h）'});
            }
          });
        });

        // ---- R7 居家办公审批中 ----
        Object.entries(signEmp).forEach(([eid, s])=>{
          (homeByEmp[eid]||[]).forEach(h=>{
            if(h.status.includes('审批中')&&s.home_off===0){
              results.push({rule:'R7', emp_id:eid, level:'warning',
                message:'居家办公审批',
                detail:'考勤日期: '+h.start.slice(0,10)+'（居家办公审批中但签字报表居家时长=0h，REG='+s.reg.toFixed(1)+'h）'});
            }
          });
        });

        state.validation.data = results;
        state._signEmp = signEmp; state._signRows = signRows;
        state._punchByEmp = punchByEmp; state._suppByEmp = suppByEmp;
        state._leaveByEmp = leaveByEmp; state._busByEmp = busByEmp; state._tripByEmp = tripByEmp;

        // Enrich results with employee info + signing report raw data
        const signReportFields = ['考勤日期','姓名','工号','三级部门','四级部门','五级部门',
          '计薪出勤时长合计(REG)','REG','计薪出勤','OT1.5合计','OT1.5','OT2.0合计','OT2.0',
          '每日总工时','每日工时','工作日出勤合计','OT0.5合计','OT0.5','居家办公合计','居家',
          '公出合计','出差合计','休息日出勤合计','法定假出勤合计','年假合计','调休假合计','病假合计','事假合计'];
        state.validation.data.forEach(r=>{
          const emp = signEmp[r.emp_id];
          if(emp){
            r.name = emp.name;
            r.dept3 = emp.dept3;
            r.dept4 = emp.dept4;
            r.dept5 = emp.dept5;
            // Attach raw signing report row that matches this anomaly
            if(r.rawData === undefined && s){
              // Try to match by rule date or fallback to first row
              const targetDate = r.date || '';
              let match = null;
              // Match by emp_id + date from signRows
              if(signRows[r.emp_id] && signRows[r.emp_id].length){
                // Find the row matching the target date
                const matchedRow = signRows[r.emp_id].find(sr => targetDate && sr.date === targetDate);
                if(matchedRow) match = matchedRow._rawRow;
              }
              if(!match){
                // Fallback: find any row in s.rows for this emp
                for(const row of s.rows){
                  const reid = cv(row,['工号','emp_id','员工编号']).trim();
                  if(reid === r.emp_id){ match = row; break; }
                }
              }
              if(match){
                // Build clean rawData object with key sign-report fields
                const rd = {};
                signReportFields.forEach(f => { if(match[f] !== undefined) rd[f] = match[f]; });
                // Also add any other fields that exist
                Object.keys(match).forEach(k => { if(rd[k] === undefined) rd[k] = match[k]; });
                r.rawData = rd;
              }
            }
          }
          // Try to extract date from detail/message (support both 2026-05-14 and 2026/05/14)
          if(!r.date){
            const m = (r.detail||r.message||'').match(/\d{4}[-\/]\d{2}[-\/]\d{2}/);
            if(m) r.date = m[0].replace(/\//g,'-');
          }
          // Fallback: use first date from signEmp's days
          if(!r.date && emp && emp.days && emp.days.length){
            r.date = emp.days[0];
          }
        });

        progressText.textContent = '执行校验规则... 共 ' + results.length + ' 条异常';
      }

      runStep(idx + 1);
    }, 150);
  }

  runStep(0);
}

// ========== VALIDATION RENDERING ==========
function applyFilters(){
  const rule=document.getElementById('ruleFilter').value;
  const search=document.getElementById('searchInput').value.toLowerCase();
  let data=state.validation.data;
  if(rule) data=data.filter(r=>r.level===rule);
  if(search) data=data.filter(r=>
    (r.emp_id||'').toLowerCase().includes(search)||
    (r.name||'').toLowerCase().includes(search)
  );
  state.validation.filtered=data;
  state.validation.page=1;
  renderStats();
  renderTable();

function renderRuleBars(){

  d.forEach(r=>{

  });
  const el=document.getElementById('ruleBarsV');
  el.innerHTML='<h3 style="font-size:14px;margin:0 0 8px;color:#333">按规则分布</h3>'+
    '<div id="ruleBars"></div>';
  const rb=document.getElementById('ruleBars');
  const max=Math.max(...Object.values(grp),1);
  Object.entries(grp).sort((a,b)=>b[1]-a[1]).forEach(([rule,cnt])=>{
    const row=document.createElement('div');row.className='bar-row';
    const pct=cnt/max*100;
    row.innerHTML='<span class="bar-label">'+esc(rule)+'</span><div style="flex:1;background:#f0f0f0;border-radius:3px"><div class="bar-fill" style="width:'+pct+'%;background:'+(COLORS[rule]||'#0E66FB')+'"></div></div><span class="bar-num">'+cnt+'条</span>';

// ========== EXPORT CSV ==========
function exportCSV(){
  if(!state.validation.validated || !state.validation.data.length) return;
  const d = state.validation.filtered.length ? state.validation.filtered : state.validation.data;
  const headers = ['工号','员工','三级部门','四级部门','五级部门','考勤日期','错误类型','错误详情'];
  const rows = [headers.join(',')];
  d.forEach(r => {
    const vals = [
      r.emp_id||'',
      r.name||'',
      r.dept3||'',
      r.dept4||'',
      r.dept5||'',
      r.date||'',
      (r.rule||'')+' '+(r.message||r.level||''),
      (r.detail||r.message||'')
    ].map(v => '"'+(v||'').replace(/"/g,'""')+'"');
    rows.push(vals.join(','));
  });
  const blob = new Blob([rows.join('\n')], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '校验结果_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ========== CONFIRMATION ==========
function buildConfirmationList(){
  if(!state.validation.validated || !state.validation.data.length){
    alert('请先在「数据校验」面板上传文件并点击「开始校验」');
    return;
  }

  // 从签字报表获取全部员工
  const signEmp = state._signEmp || {};
  const allEmps = Object.keys(signEmp);

  // 从校验结果统计异常
  const anomalyMap = {};
  state.validation.data.forEach(r => {
    const key = r.emp_id;
    if(!key) return;
    if(!anomalyMap[key]){
      anomalyMap[key] = { count: 0, rules: [], errors: [] };
    }
    anomalyMap[key].count++;
    anomalyMap[key].rules.push(r.rule || '未知');
    anomalyMap[key].errors.push(r.message || r.detail || '');
  });

  // 合并：所有签字报表员工 + 有异常但不在签字报表中的员工（兜底）
  const empMap = {};
  allEmps.forEach(eid => {
    const emp = signEmp[eid];
    const a = anomalyMap[eid];
    empMap[eid] = {
      emp_id: eid,
      name: emp.name || '',
      dept3: emp.dept3 || '',
      dept4: emp.dept4 || '',
      dept5: emp.dept5 || '',
      reg: emp.reg || 0,
      ot15: emp.ot15 || 0,
      ot20: emp.ot20 || 0,
      home_off: emp.home_off || 0,
      days: emp.days || [],
      count: a ? a.count : 0,
      status: a ? '待确认' : '无异常',
      rules: a ? a.rules : [],
      errors: a ? a.errors : [],
      dailyRows: (state._signRows && state._signRows[eid]) ? state._signRows[eid].slice(0, 31) : [],
      punches: (state._punchByEmp && state._punchByEmp[eid]) ? state._punchByEmp[eid].slice(0, 62) : [],
      supps: (state._suppByEmp && state._suppByEmp[eid]) ? state._suppByEmp[eid].slice(0, 10) : [],
      leave: (state._leaveByEmp && state._leaveByEmp[eid]) ? state._leaveByEmp[eid] : null,
      buses: (state._busByEmp && state._busByEmp[eid]) ? state._busByEmp[eid].slice(0, 10) : [],
      trips: (state._tripByEmp && state._tripByEmp[eid]) ? state._tripByEmp[eid].slice(0, 10) : [],
      _selected: true, // default checked
      _sendStatus: 'pending' // 'pending' | 'ok' | 'fail' | 'sending'
    };
    delete anomalyMap[eid]; // remove handled
  });
  // 添加有异常但不在签字报表中的（兜底）
  Object.entries(anomalyMap).forEach(([eid, a]) => {
    if(!empMap[eid] && eid){
      empMap[eid] = {
        emp_id: eid,
        name: '',
        dept3: '', dept4: '', dept5: '',
        count: a.count,
        status: '待确认',
        rules: a.rules,
        errors: a.errors
      };
    }
  });

  state.confirmation.rows = Object.values(empMap);
  state.confirmation.loaded = true;
  renderConfirmation();
}

function renderConfirmation(){
  const rows = state.confirmation.rows;
  if(!rows.length){
    document.getElementById('confirmTbody').innerHTML = '<tr><td colspan="8" class="empty">暂无数据</td></tr>';
    return;
  }

  const total = rows.length;
  const confirmed = rows.filter(r => r.status === '已确认').length;
  const objection = rows.filter(r => r.status === '有异议').length;
  const clean = rows.filter(r => r.status === '无异常').length;
  const pending = total - confirmed - objection - clean;

  document.getElementById('totalEmp').textContent = total;
  document.getElementById('confirmedCount').textContent = confirmed;
  document.getElementById('pendingCount').textContent = pending;
  document.getElementById('objectionCount').textContent = objection;
  document.getElementById('cleanCount').textContent = clean;
  document.getElementById('statsC').style.display = 'grid';

  document.getElementById('confirmBadge').innerHTML = '👥 共 <strong>'+total+'</strong> 人（签字报表总人数） · 待确认 <strong>'+pending+'</strong> 人 · 已确认 <strong>'+confirmed+'</strong> 人 · 有异议 <strong>'+objection+'</strong> 人 · 无异常 <strong>'+clean+'</strong> 人';

  // progress bar
  const pb = document.getElementById('progressBar');
  const pc = [confirmed/total*100, pending/total*100, objection/total*100, clean/total*100];
  pb.innerHTML = '<div class="seg success" style="width:'+pc[0]+'%"></div><div class="seg warning" style="width:'+pc[1]+'%"></div><div class="seg danger" style="width:'+pc[2]+'%"></div><div class="seg clean" style="width:'+pc[3]+'%"></div>';
  document.getElementById('progressLabels').innerHTML =
    '<span>&#9989; 已确认 '+confirmed+' ('+Math.round(pc[0])+'%)</span>'+
    '<span>&#9203; 待确认 '+pending+' ('+Math.round(pc[1])+'%)</span>'+
    '<span>&#9888;&#65039; 有异议 '+objection+' ('+Math.round(pc[2])+'%)</span>'+
    '<span>&#9989; 无异常 '+clean+' ('+Math.round(pc[3])+'%)</span>';
  document.getElementById('progressSection').style.display = 'block';

  // Update all-checked state and send count
  updateSendCount();

  // table rows
  const tbody = document.getElementById('confirmTbody');
  tbody.innerHTML = rows.map(r => {
    const dept = [r.dept3, r.dept4, r.dept5].filter(Boolean).join(' / ');
    const isClean = r.status === '无异常';
    const statusBadge = r.status === '已确认' ? 'badge-success' : r.status === '有异议' ? 'badge-error' : r.status === '无异常' ? 'badge-success' : 'badge-pending';
    const statusLabel = r.status === '待确认' ? '⏳ 待确认' : r.status === '已确认' ? '✅ 已确认' : r.status === '无异常' ? '✅ 无异常' : '⚠️ 有异议';
    const countStyle = isClean ? 'color:#27AE60' : 'color:#D9001B;font-weight:600';
    const cleanClass = isClean ? 'row-clean' : '';
    // Send status display
    let sendDisplay = '';
    if(r._sendStatus === 'pending'){
      sendDisplay = '<span class="status-badge status-badge-pending">— 未发送</span>';
    } else if(r._sendStatus === 'ok'){
      sendDisplay = '<span class="status-badge status-badge-ok">✅ 已发送 '+(r._sendTime||'')+'</span>';
    } else if(r._sendStatus === 'fail'){
      sendDisplay = '<span class="status-badge status-badge-fail">❌ 失败 '+(r._sendTime||'')+'</span>';
    } else if(r._sendStatus === 'sending'){
      sendDisplay = '<span class="status-badge status-badge-sending">⏳ 发送中...</span>';
    }
    return '<tr class="'+cleanClass+'">'+
      '<td class="chk-col" style="padding:8px 4px;text-align:center;border-bottom:1px solid #f0f0f0">'+
        '<input type="checkbox" class="confirm-chk" '+(r._selected?'checked':'')+' onchange="toggleRowSelect(\''+esc(r.emp_id)+'\',this.checked)">'+
      '</td>'+
      '<td style="padding:8px 10px;border-bottom:1px solid #f0f0f0;font-weight:600'+(isClean?';color:#27AE60':'')+'">'+esc(r.emp_id)+'</td>'+
      '<td style="padding:8px 10px;border-bottom:1px solid #f0f0f0">'+esc(r.name)+'</td>'+
      '<td style="padding:8px 10px;border-bottom:1px solid #f0f0f0;font-size:12px;color:#666">'+esc(dept)+'</td>'+
      '<td style="padding:8px 10px;border-bottom:1px solid #f0f0f0;text-align:center;'+countStyle+'">'+(isClean?'—':r.count)+'</td>'+
      '<td style="padding:8px 10px;border-bottom:1px solid #f0f0f0;text-align:center"><span class="badge '+statusBadge+'">'+statusLabel+'</span></td>'+
      '<td style="padding:8px 10px;border-bottom:1px solid #f0f0f0;text-align:center">'+sendDisplay+'</td>'+
      '<td style="padding:8px 10px;border-bottom:1px solid #f0f0f0;text-align:center">'+
        '<button class="btn btn-sm" onclick="showEmpClock(\''+esc(r.emp_id)+'\')" style="margin-right:4px">⏰ 考勤记录</button>'+
        (isClean ? '' :
          '<button class="btn btn-sm" onclick="showEmpErrors(\''+esc(r.emp_id)+'\')" style="margin-right:4px">📋 异常明细</button>')+
        (r.status === '待确认' || r.status === '无异常' ?
          '<button class="btn btn-sm btn-success" onclick="markConfirmed(\''+esc(r.emp_id)+'\')">✅ 标记已确认</button>' : '')+
        (r.status === '有异议' ?
          '<button class="btn btn-sm btn-warning" onclick="showObjectionDetail(\''+esc(r.emp_id)+'\')" style="margin-left:4px">📋 查看异议</button>' : '')+
        '<button class="btn btn-sm" onclick="showCardPreview(\''+esc(r.emp_id)+'\')" style="margin-left:4px">📨 卡片预览</button>'+
      '</td></tr>';
  }).join('');

  document.getElementById('sendAllBtn').disabled = false;
  saveState();
}

  const row = state.confirmation.rows.find(r => r.emp_id === eid);

  updateSendCount();
}

// Helper: update send count badge
function updateSendCount(){
  const rows = state.confirmation.rows;
  if(!rows.length){ document.getElementById('sendCountBadge').textContent = ''; return; }
  const selected = rows.filter(r => r._selected).length;
  const total = rows.length;
  document.getElementById('sendCountBadge').textContent = '已选 ' + selected + ' / ' + total + ' 人';
  const sendBtn = document.getElementById('sendAllBtn');
  if(sendBtn) sendBtn.disabled = (selected === 0);
}

  const overlay = document.createElement('div');

  overlay.innerHTML =
    '<div class="modal-box" style="max-width:600px">'+
    '<button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">&times;</button>'+
    '<h2>⚠️ 异议详情</h2>'+
    '<div style="background:#fef9ef;border:1px solid #fce5cd;border-radius:8px;padding:12px;margin-bottom:12px">'+

function buildCardContent(emp){
  const dept = [emp.dept3, emp.dept4, emp.dept5].filter(Boolean).join(' / ');

  // Build punch clock lookup by date
  const punchByDate = {};
  if(emp.punches && emp.punches.length){
    emp.punches.forEach(p => {
      if(!punchByDate[p.date]) punchByDate[p.date] = [];
      punchByDate[p.date].push(p.datetime);
    });
  }

  // Build daily rows table (limit 15 for card size)
  let dailyRowsText = '';
  if(emp.dailyRows && emp.dailyRows.length){
    const rows = emp.dailyRows.slice(0, 15);
    dailyRowsText = rows.map(dr => {
      const r = dr._rawRow || {};
      const date = dr.date || '';
      const clocks = punchByDate[date] || [];
      // Time-only format: 13:01:06, 08:30:02
      const clockStr = clocks.length ? clocks.map(c=>c.replace(/-/g,'/').slice(11)).join(', ') : '—';
      return date+' │ '+clockStr;
    }).join('\\n');
    if(emp.dailyRows.length > 15) dailyRowsText += '\\n...等'+emp.dailyRows.length+'条记录';
  }

  // Build attendance process modules
  let moduleText = '';

  // Leave
  if(emp.leave && emp.leave.type){
    moduleText += '\\n---\\n🏖️ 休假：'+emp.leave.type+'  '+emp.leave.start+' ~ '+emp.leave.end;
  }

  // Business errand
  if(emp.buses && emp.buses.length){
    moduleText += '\\n---\\n🚗 公出：共'+emp.buses.length+'条';
    emp.buses.slice(0, 5).forEach(b => {
      moduleText += '\\n  ·'+ (b.start||'-')+' ('+(b.status||'-')+')';

  // Business trip
  if(emp.trips && emp.trips.length){

    emp.trips.slice(0, 5).forEach(b => {

  }

  // Supplementary sign
  if(emp.supps && emp.supps.length){
    moduleText += '\\n---\\n🔏 补签：共'+emp.supps.length+'条';
    emp.supps.slice(0, 5).forEach(s => {
      moduleText += '\\n  ·'+s.date+' '+ (s.status||'-');
    });
  }

  // Build body elements
  const elements = [
    { tag: 'div', text: { tag: 'lark_md', content: '**'+esc(emp.name)+'** ('+emp.emp_id+')\n部门：'+dept } },
    { tag: 'hr' },
    { tag: 'div', text: { tag: 'lark_md', content: '📋 **考勤确认通知**' } }
  ];

  // Daily details with clock times — only date + full clock times (no REG/OT)
  if(dailyRowsText){
    elements.push({ tag: 'div', text: { tag: 'lark_md',
      content: dailyRowsText
    }});
  } else {
    elements.push({ tag: 'div', text: { tag: 'lark_md', content: '每日明细：无签字报表明细数据' } });
  }

  // Attendance process modules
  if(moduleText){
    elements.push({ tag: 'hr' });
    elements.push({ tag: 'div', text: { tag: 'lark_md',
      content: '**— 其他考勤流程 —**'+moduleText
    }});
  }

  elements.push({ tag: 'div', text: { tag: 'lark_md', content: '请确认以上考勤数据是否正确。如有疑问请联系HR。' } });
  elements.push({ tag: 'hr' });
  elements.push({
    tag: 'action',
    actions: [

      { tag: 'button', text: { tag: 'plain_text', content: '⚠️ 有异议' }, type: 'danger', value: { action: 'object', emp_id: emp.emp_id } }
    ]

function doSendFeishuCards(){
  const overlay = document.getElementById('cardPreviewOverlay');
  if(overlay) overlay.remove();

  // Read test mode from inline controls
  const testMode = document.getElementById('testModeSwitch') ? document.getElementById('testModeSwitch').checked : false;
  const testEmpId = testMode ? (document.getElementById('testEmpIdInline') ? document.getElementById('testEmpIdInline').value.trim() : '') : '';

  // Get selected rows
  const toSend = state.confirmation.rows.filter(r => r._selected);
  if(!toSend.length){ alert('没有要发送的员工'); return; }

  // Mark all as sending
  toSend.forEach(r => { r._sendStatus = 'sending'; });
  renderConfirmation();

  // Show progress overlay
  const progressOverlay = document.createElement('div');
  progressOverlay.className = 'modal-overlay';
  progressOverlay.id = 'sendProgressOverlay';
  progressOverlay.onclick = function(e){if(e.target===progressOverlay && progressOverlay.dataset.done==='1') progressOverlay.remove()};
  progressOverlay.innerHTML =
    '<div class="modal-box" style="max-width:500px;text-align:center">'+
    '<h2>🚀 正在发送飞书卡片</h2>'+
    '<div style="margin:16px 0"><div class="progress-bar-bg"><div id="sendProgressFill" class="progress-bar-fill" style="width:0%"></div></div></div>'+
    '<div id="sendProgressText" style="font-size:13px;color:#555;margin-bottom:8px">准备中...</div>'+
    '<div id="sendProgressDetail" style="font-size:12px;color:#999;max-height:200px;overflow-y:auto;text-align:left;background:#f8f9fa;border-radius:6px;padding:8px;margin-top:8px"></div>'+
    '<div style="margin-top:12px"><button class="btn" id="closeSendBtn" onclick="this.parentElement.parentElement.parentElement.remove()" style="display:none">关闭</button></div>'+
    '</div>';
  document.body.appendChild(progressOverlay);

  // Build card data
  const cardsData = toSend.map(emp => {
    const dept = [emp.dept3, emp.dept4, emp.dept5].filter(Boolean).join(' / ');
    const card = buildCardContent(emp);
    // Ensure card is an object (not a string)
    return {
      emp_id: emp.emp_id,
      name: emp.name,
      dept: dept,
      count: emp.count,
      card: card
    };
  });

  const url = getServerUrl() + '/api/send';
  const detailEl = document.getElementById('sendProgressDetail');
  const fillEl = document.getElementById('sendProgressFill');
  const textEl = document.getElementById('sendProgressText');
  const closeBtn = document.getElementById('closeSendBtn');

  // Use fetch with streaming progress
  fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      cards: cardsData,
      test_mode: testMode,
      test_emp_id: testEmpId,
      app_id: FEISHU_CONFIG.APP_ID,
      app_secret: FEISHU_CONFIG.APP_SECRET
    })
  }).then(async function(res){
    if(!res.ok) throw new Error('服务器返回 '+res.status);
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    let results = [];
    // Read the streaming NDJSON response
    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      buf += decoder.decode(value, {stream: true});
      // Parse NDJSON — split by newline
      const lines = buf.split('\n');
      buf = lines.pop(); // keep incomplete line
      for(const line of lines){
        if(!line.trim()) continue;
        try {
          const evt = JSON.parse(line.trim());
          if(evt.type === 'progress'){
            const pct = Math.round(evt.done / evt.total * 100);
            fillEl.style.width = pct + '%';
            textEl.textContent = evt.done + '/' + evt.total + ' 已发送';
            const log = evt.done === 0 ? '开始发送...' : evt.last_log || '';
            if(log) detailEl.innerHTML += '<div>' + log + '</div>';
            detailEl.scrollTop = detailEl.scrollHeight;
          } else if(evt.type === 'done'){
            results = evt.results || [];
          }
        } catch(e){ /* skip parse errors */ }
      }
    }
    // Process remaining buffer
    if(buf.trim()){
      try {
        const evt = JSON.parse(buf.trim());
        if(evt.type === 'done') results = evt.results || [];
      } catch(e){}
    }
    return results;
  }).then(function(results){
    // Update send status
    const now = new Date();
    const ts = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    let ok=0, fail=0;
    results.forEach(r => {
      const row = state.confirmation.rows.find(x => x.emp_id === r.emp_id);
      if(row){
        if(r.status === 'ok'){
          row._sendStatus = 'ok';
          row._sendTime = ts;
          ok++;
        } else {
          row._sendStatus = 'fail';
          row._sendTime = ts;
          fail++;
        }
      }
    });
    renderConfirmation();
    saveState();
    fillEl.style.width = '100%';
    textEl.textContent = '✅ 完成！成功 ' + ok + '，失败 ' + fail;
    detailEl.innerHTML += '<div style="font-weight:600;color:#333;margin-top:8px">✅ 成功 ' + ok + ' | ❌ 失败 ' + fail + '</div>';
    closeBtn.style.display = 'inline-block';
  }).catch(function(err){
    textEl.textContent = '❌ 发送失败：' + err.message;
    detailEl.innerHTML += '<div style="color:#D9001B">❌ ' + err.message + '</div>';
    closeBtn.style.display = 'inline-block';
    // Mark all as failed
    toSend.forEach(r => { r._sendStatus = 'fail'; });
    renderConfirmation();
    saveState();
  });
}

function showEmpClock(eid){
  // 从所有上传文件中查找该员工的数据（打卡记录或签字报表）
  const clockRows = [];
  // 优先从打卡记录文件中找
  let clockFile = null;
  Object.keys(state.files).forEach(fname => {
    if(fname.toLowerCase().includes('打卡')) clockFile = state.files[fname];
  });
  if(clockFile){
    clockFile.forEach(r => {
      const reid = r.emp_id || r.emp || r['工号'] || r['员工编号'] || r['员工ID'] || r.employee_number;
      if(reid && String(reid).trim() === eid) clockRows.push(r);

      if(fname.toLowerCase().includes('签字') || fname.toLowerCase().includes('报表') || fname.toLowerCase().includes('美区')){

      keys.slice(0,12).map(k => '<th>'+esc(k)+'</th>').join('')+

  }

  overlay.innerHTML =
    '<div class="modal-box" style="max-width:800px">'+
    '<button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">&times;</button>'+
    '<h2>⏰ 员工考勤记录 — '+esc(eid)+'</h2>'+

  let rawHtml = '';
  if(rawDatas.length){
    rawHtml = '<div style="background:#f8f9fa;padding:12px;border-radius:6px;margin-bottom:12px">'+
      '<div style="font-weight:600;margin-bottom:8px;color:#333">📄 签字报表源数据</div>';
    rawDatas.forEach((rd, ri) => {
      const parts = [];
      ['考勤日期','姓名','工号','三级部门','四级部门','五级部门',
        '计薪出勤时长合计(REG)','REG','OT1.5合计','OT1.5','OT2.0合计','OT2.0',
        '每日总工时','居家办公合计','公出合计','出差合计','年假合计','病假合计','事假合计'
      ].forEach(k => {
        if(rd[k] !== undefined && rd[k] !== '') parts.push(k+': '+rd[k]);
      });
      if(parts.length){
        rawHtml += '<div style="font-size:12px;color:#555;line-height:1.6;'+(rawDatas.length>1?'margin-bottom:6px;':'')+'">'+
          parts.join(' | ')+'</div>';
      }
    });
    rawHtml += '</div>';
  }

  overlay.innerHTML =
    '<div class="modal-box" style="max-width:700px">'+
    '<button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">&times;</button>'+
    '<h2>📋 异常明细 — '+esc(eid)+'</h2>'+
    rawHtml+
    '<table class="modal-table"><thead><tr>'+
    '<th>规则</th><th>风险</th><th>错误详情</th></tr></thead><tbody>'+
    errs.map(r =>
      '<tr>'+
      '<td style="font-weight:600">'+esc(r.rule)+'</td>'+
      '<td><span class="badge '+(r.level==='error'?'badge-error':'badge-warning')+'">'+esc(r.level)+'</span></td>'+
      '<td style="color:#D9001B;font-size:12px">⚠ '+esc(r.detail||r.message||'')+'</td></tr>'
    ).join('')+
    '</tbody></table></div>';
  document.body.appendChild(overlay);
}

function esc(s){if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML;}

// Restore state from localStorage on page load
loadState();
</script>
</body>
</html>
